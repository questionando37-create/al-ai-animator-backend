<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AL.AI Animator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #11131a; --surface2: #1a1d26; --border: #2a2f3a;
      --text: #e6e6f0; --muted: #8a8fa0; --primary: #6366f1; --primary-hover: #4f46e5;
      --success: #10b981; --warning: #f59e0b; --error: #ef4444; --card: #151821;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; }
    .tagline { font-size: .75rem; color: var(--muted); margin-left: 8px; }
    .menu-btn { background
